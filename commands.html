<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お助け！マイスちゃんbot！公式サイト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo">
        <img src="img/bot_icon.png" alt="アイコン" class="nav-icon">
        お助け！マイスちゃんbot！
    </a>
    <button class="menu-btn" id="menuBtn">☰</button>
</nav>

<div class="nav-links" id="navLinks"></div>

<script>
    // nav.htmlを読み込んで id="navLinks" に流し込む
    fetch('nav.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('navLinks').innerHTML = data;
        });
</script>

<header class="main-header">
</header>

<div class="container">
    <section>
        <h2>コマンド</h2>
        <p>問題生成、漢字でGO！関連他</p>
    </section>
        <section>
        <h2></h2>
        <p></p>
    </section>
</div>

<footer>
    <p>&copy; 2026 㐅メ夕タ (Itsutsume Yuta)</p>
</footer>

<script>
    const menuBtn = document.getElementById('menuBtn');
    const navLinks = document.getElementById('navLinks');

    menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        navLinks.classList.toggle('active');
        menuBtn.textContent = navLinks.classList.contains('active') ? '✕' : '☰';
    });

    document.addEventListener('click', (e) => {
        if (!navLinks.contains(e.target) && navLinks.classList.contains('active')) {
            navLinks.classList.remove('active');
            menuBtn.textContent = '☰';
        }
    });
</script>

</body>
</html>
