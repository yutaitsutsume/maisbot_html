<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お助け！マイスちゃんbot！公式サイト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo">
        <img src="img/bot_icon.png" alt="アイコン" class="nav-icon">
        お助け！マイスちゃんbot！
    </a>
    <button class="menu-btn" id="menuBtn">☰</button>
</nav>

<!-- ここにメニューが流し込まれます -->
<div class="nav-links" id="navLinks"></div>

<script>
    // nav.htmlを読み込んで id="navLinks" に流し込む
    fetch('nav.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('navLinks').innerHTML = data;
        });
</script>

<header class="main-header">
</header>

<div class="container">
    <section>
        <h2>このbotについて</h2>
        <p>あなたのDiscordサーバーを少し便利にする多機能Botです。<br>計算、漢字でGO！に関する機能やジェネレーター、ちょっとしたお遊び機能を備えた、シンプルで使いやすく、それでいて痒いところに手が届く。そんなツールを目指して開発しています。<br>皆様に楽しく便利にご利用頂けたら幸いです。是非導入してみてはいかがでしょうか。</p>
    </section>
        <section>
        <h2>マイスちゃんとは...？</h2>
        <p>漢字でGO！のボーナスステージに出てくる美少女キャラクター。</p>
    </section>

<section class="action-area">
    <div class="button-group">
        <!-- 招待ボタン -->
        <a href="https://discord.com/oauth2/authorize?client_id=1477164306285068370&permissions=8&integration_type=0&scope=bot" class="btn-invite">
            Discordに追加する
        </a>
        
        <!-- サポートサーバーボタン（色を変えて区別） -->
        <a href="https://discord.gg/4JU9Yky4Mw" class="btn-support">
            サポートサーバーに参加
        </a>
    </div>
</section>
</div>

<footer>
    <p>&copy; 2026 㐅メ夕タ (Itsutsume Yuta)</p>
</footer>

<script>
    const menuBtn = document.getElementById('menuBtn');
    const navLinks = document.getElementById('navLinks');

    menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        navLinks.classList.toggle('active');
        menuBtn.textContent = navLinks.classList.contains('active') ? '✕' : '☰';
    });

    document.addEventListener('click', (e) => {
        if (!navLinks.contains(e.target) && navLinks.classList.contains('active')) {
            navLinks.classList.remove('active');
            menuBtn.textContent = '☰';
        }
    });
</script>

</body>
</html>
