        /* 全体：白と薄いグレーで明るく */

            background-color: #ffffff;

            font-family: sans-serif; /* 痛々しさを抜くためにゴシック体推奨 */
            line-height: 1.8;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #f8f9fa; /* わずかにグレーにして境界を出す */

        }
        header h1 {
            color: #5865F2; /* Discordに近い青でアクセント */

        }
        nav {
            position: sticky;
            top: 0;
            background: #ffffff;
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #eee;

        }
        nav a {
            color: #666; /* 明るい背景に合うグレー */
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.95em;
            font-weight: bold;
        }
        nav a:hover { color: #5865F2; } /* ホバー時は青に */

        .container { max-width: 800px; margin: auto; padding: 40px 20px; }
        section { margin-bottom: 60px; }
        
        /* 見出し：白背景でも見えるように修正 */
        h2 { 
            color: #333; 
            border-left: 5px solid #5865F2; 
            padding-left: 15px; 
            margin-bottom: 20px;
        }
        
        /* コマンドボックス：明るい背景用に調整 */
        .command-box { 
            background: #fdfdfd; 
            padding: 15px; 
            border-radius: 5px; 
            margin-bottom: 10px; 
            border: 1px solid #eee; 
            border-left: 3px solid #5865F2;
        }

        .btn-invite {
            display: inline-block;
            background: #5865F2;
            color: white;
            padding: 18px 36px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.2s;
        }
        .btn-invite:hover { background: #4752c4; }

        footer { text-align: center; padding: 40px; color: #999; font-size: 0.8em; border-top: 1px solid #eee; }
