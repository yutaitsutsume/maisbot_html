<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お助け！マイスちゃんbot！公式サイト</title>
    <style>
        /* --- 既存のスタイルは維持しつつ、以下を調整・追加 --- */
        body {
            background-color: #ffffff;
            color: #333333;
            font-family: sans-serif;
            line-height: 1.8;
            margin: 0;
            padding: 0;
        }

        /* ナビゲーションバーの土台 */
        nav {
            position: sticky;
            top: 0;
            background: #ffffff;
            padding: 12px 20px;
            display: flex;
            justify-content: flex-end; /* 右側にボタンを寄せる */
            align-items: center;
            border-bottom: 1px solid #eee;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        /* 「三」ボタンのデザイン */
        .menu-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #5865F2;
            padding: 5px 10px;
            display: block; /* 常に表示 */
        }

        /* 隠れているメニュー本体 */
        .nav-links {
            position: fixed;
            top: 55px; /* navの高さに合わせる */
            right: -100%; /* 最初は画面の外（右）に隠す */
            width: 250px;
            height: calc(100vh - 55px);
            background: #ffffff;
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-left: 1px solid #eee;
            transition: 0.3s; /* スッと出るアニメーション */
            box-shadow: -2px 0 5px rgba(0,0,0,0.05);
        }

        /* メニューが開いた時の状態 */
        .nav-links.active {
            right: 0;
        }

        .nav-links a {
            color: #666;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 1em;
            font-weight: bold;
        }

        .nav-links a:hover { color: #5865F2; }

        /* 既存の他のスタイル（header, container等）はそのまま */
        header { background-color: #f8f9fa; padding: 60px 20px; text-align: center; border-bottom: 1px solid #ddd; }
        header h1 { color: #5865F2; margin: 0; }
        .container { max-width: 800px; margin: auto; padding: 40px 20px; }
        h2 { color: #333; border-left: 5px solid #5865F2; padding-left: 15px; margin-bottom: 20px; }
        .btn-invite { display: inline-block; background: #5865F2; color: white; padding: 18px 36px; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 20px; transition: 0.2s; }
        footer { text-align: center; padding: 40px; color: #999; font-size: 0.8em; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<nav>
    <!-- ハンバーガーボタン -->
    <button class="menu-btn" id="menuBtn">☰</button>
    
    <!-- 中身のリンク -->
    <div class="nav-links" id="navLinks">
        <a href="index.html">ホーム</a>
        <a href="commands.html">コマンド</a>
        <a href="function.html">機能</a>
        <a href="support.html">サポート</a>
        <a href="terms.html">ご利用規約</a>
        <a href="privacypolicy.html">プライバシーポリシー</a>
        <a href="https://discord.com/oauth2/authorize?client_id=1477164306285068370&permissions=8&integration_type=0&scope=bot>Discordに追加する</a>
    </div>
</nav>

<header>
    <h1>お助け！マイスちゃんbot！</h1>
    <p>あなたのDiscordサーバーを少し便利にする多機能Botです。</p>
</header>

<div class="container">
    <section id="about">
        <h2>マイスちゃんについて</h2>
        <p>計算、画像処理、ちょっとしたお遊び機能を備えたBotです。使いやすさと安心を第一に開発しています。</p>
    </section>

    <section id="invite" style="text-align: center;">
        <h2>Botを招待する</h2>
        <p>下のボタンからサーバーへ追加できます。</p>
        <a href="https://discord.com/oauth2/authorize?client_id=1477164306285068370&permissions=8&integration_type=0&scope=bot" class="btn-invite">Discordに追加する</a>
    </section>
</div>

<footer>
    &copy; 2026 五目夕太 (Itsutsume Yuta)
</footer>

<!-- メニューを開閉するためのJavaScript -->
<script>
    const menuBtn = document.getElementById('menuBtn');
    const navLinks = document.getElementById('navLinks');

    menuBtn.addEventListener('click', () => {
        navLinks.classList.toggle('active');
        // ボタンの文字を切り替える（任意）
        if (navLinks.classList.contains('active')) {
            menuBtn.textContent = '✕';
        } else {
            menuBtn.textContent = '☰';
        }
    });

    // 画面のどこかをクリックしたらメニューを閉じる設定（お好みで）
    document.addEventListener('click', (e) => {
        if (!menuBtn.contains(e.target) && !navLinks.contains(e.target)) {
            navLinks.classList.remove('active');
            menuBtn.textContent = '☰';
        }
    });
</script>

</body>
</html>
